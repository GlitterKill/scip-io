<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="SCIP-IO — multiple language sources in, one index.scip out">
  <title>SCIP-IO header</title>

  <!-- ============== defs ============== -->
  <defs>
    <!-- dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1b"/>
      <stop offset="1" stop-color="#141824"/>
    </linearGradient>

    <!-- cyan/magenta accent stripe -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffcc"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff00aa"/>
    </linearGradient>

    <!-- central box gradient -->
    <linearGradient id="boxFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2336"/>
      <stop offset="1" stop-color="#0f1320"/>
    </linearGradient>

    <!-- soft cyan glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- subtle scanline pattern overlay -->
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <rect width="4" height="1" fill="#00ffcc" opacity="0.025"/>
    </pattern>

    <!-- arrow marker for language lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00ffcc"/>
    </marker>

    <marker id="arrowOut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff00aa"/>
    </marker>

    <!-- chip (language pill) style reused -->
    <style>
      .pill {
        fill: #141824;
        stroke: #00ffcc;
        stroke-width: 1.4;
      }
      .pill-text {
        font-family: 'Consolas', 'JetBrains Mono', 'Fira Code', monospace;
        font-weight: 700;
        font-size: 15px;
        fill: #00ffcc;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .wire {
        fill: none;
        stroke: #00ffcc;
        stroke-width: 1.8;
        stroke-linecap: round;
        opacity: 0.85;
      }
      .wire-out {
        fill: none;
        stroke: #ff00aa;
        stroke-width: 2.6;
        stroke-linecap: round;
      }
      .title {
        font-family: 'Consolas', 'JetBrains Mono', monospace;
        font-weight: 800;
        font-size: 56px;
        fill: #00ffcc;
        text-anchor: middle;
        letter-spacing: 4px;
      }
      .subtitle {
        font-family: 'Consolas', 'JetBrains Mono', monospace;
        font-weight: 600;
        font-size: 13px;
        fill: #8b5cf6;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .output-text {
        font-family: 'Consolas', 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 18px;
        fill: #ff00aa;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <!-- ============== background ============== -->
  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#scan)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <rect x="0" y="377" width="1200" height="3" fill="url(#accent)"/>

  <!-- ============== LEFT: language pills ============== -->
  <!-- Column 1 -->
  <g transform="translate(60, 60)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">TypeScript</text>
  </g>
  <g transform="translate(60, 110)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">JavaScript</text>
  </g>
  <g transform="translate(60, 160)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Python</text>
  </g>
  <g transform="translate(60, 210)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Rust</text>
  </g>
  <g transform="translate(60, 260)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Go</text>
  </g>
  <g transform="translate(60, 310)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Java</text>
  </g>

  <!-- Column 2 -->
  <g transform="translate(210, 60)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Scala</text>
  </g>
  <g transform="translate(210, 110)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Kotlin</text>
  </g>
  <g transform="translate(210, 160)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">C#</text>
  </g>
  <g transform="translate(210, 210)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">C / C++</text>
  </g>
  <g transform="translate(210, 260)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">Ruby</text>
  </g>
  <g transform="translate(210, 310)">
    <rect class="pill" x="0" y="0" width="130" height="34" rx="6"/>
    <text class="pill-text" x="65" y="18">…and more</text>
  </g>

  <!-- ============== wires from right edge of col 2 pills into the box ============== -->
  <g filter="url(#glow)">
    <path class="wire" d="M 340 77  C 420 77, 460 190, 540 190" marker-end="url(#arrow)"/>
    <path class="wire" d="M 340 127 C 420 127, 470 190, 540 190" marker-end="url(#arrow)"/>
    <path class="wire" d="M 340 177 C 420 177, 480 190, 540 190" marker-end="url(#arrow)"/>
    <path class="wire" d="M 340 227 C 420 227, 480 190, 540 190" marker-end="url(#arrow)"/>
    <path class="wire" d="M 340 277 C 420 277, 470 190, 540 190" marker-end="url(#arrow)"/>
    <path class="wire" d="M 340 327 C 420 327, 460 190, 540 190" marker-end="url(#arrow)"/>
  </g>

  <!-- ============== CENTER: SCIP-IO box ============== -->
  <g transform="translate(540, 100)">
    <!-- outer box with glow -->
    <rect x="0" y="0" width="260" height="180" rx="14" fill="url(#boxFill)" stroke="#00ffcc" stroke-width="2.5" filter="url(#glow)"/>
    <!-- top accent stripe on the box -->
    <rect x="0" y="0" width="260" height="4" rx="2" fill="url(#accent)"/>
    <!-- title -->
    <text class="title" x="130" y="95">SCIP-IO</text>
    <!-- subtitle -->
    <text class="subtitle" x="130" y="128">INDEX ORCHESTRATOR</text>
    <!-- small status dots -->
    <circle cx="20" cy="160" r="3" fill="#00ffcc"/>
    <circle cx="32" cy="160" r="3" fill="#8b5cf6"/>
    <circle cx="44" cy="160" r="3" fill="#ff00aa"/>
    <text x="240" y="164" font-family="Consolas, monospace" font-size="11" fill="#8b5cf6" text-anchor="end" letter-spacing="1">v0.1.0</text>
  </g>

  <!-- ============== RIGHT: output wire + index.scip file ============== -->
  <g filter="url(#glow)">
    <path class="wire-out" d="M 800 190 L 940 190" marker-end="url(#arrowOut)"/>
  </g>

  <!-- file icon with dog-eared corner -->
  <g transform="translate(960, 130)">
    <!-- glow back -->
    <rect x="-4" y="-4" width="178" height="128" rx="10" fill="#ff00aa" opacity="0.15"/>
    <!-- file body -->
    <path d="M 0 0 L 130 0 L 170 40 L 170 120 L 0 120 Z"
          fill="#141824" stroke="#ff00aa" stroke-width="2.5"/>
    <!-- dog-ear -->
    <path d="M 130 0 L 170 40 L 130 40 Z" fill="#1e2336" stroke="#ff00aa" stroke-width="2"/>
    <!-- filename -->
    <text class="output-text" x="85" y="62">index.scip</text>
    <!-- tiny label lines mimicking content -->
    <rect x="20" y="78"  width="130" height="2" rx="1" fill="#00ffcc" opacity="0.55"/>
    <rect x="20" y="86"  width="100" height="2" rx="1" fill="#00ffcc" opacity="0.45"/>
    <rect x="20" y="94"  width="115" height="2" rx="1" fill="#00ffcc" opacity="0.35"/>
    <rect x="20" y="102" width="80"  height="2" rx="1" fill="#00ffcc" opacity="0.25"/>
  </g>

  <!-- small "merged" badge over the arrow -->
  <g transform="translate(820, 162)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="#0a0e1b" stroke="#ff00aa" stroke-width="1.3"/>
    <text x="45" y="15" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#ff00aa" text-anchor="middle" letter-spacing="1">MERGED</text>
  </g>
</svg>
